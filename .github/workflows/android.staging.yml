name: Staging android APK to email

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["staging"]
  pull_request:
    branches: ["staging"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    name: Build Android APK and email to team
    steps:
      - uses: actions/checkout@v2
      - name: Setup Java and Node.js
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: "18.x"
      # Copy appropriate env file based on branch
      - name: Copy env file
        run: |
          ls -la universal-wallet
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            cp universal-wallet/.env.prod universal-wallet/.env
            cat universal-wallet/.env
          else 
            cp universal-wallet/.env.stg universal-wallet/.env
            cat universal-wallet/.env
          fi

      # Creat staging release
      - name: create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_id }}.staging
          release_name: Staging ${{ github.workflow_ref }}
          body: |
            Staging ${{ github.workflow_ref }} release
          draft: false
          prerelease: false

      # Prebuild the expo project
      - name: Install Expo CLI
        run: npm install -g yarn && export CI=false
      - name: Install dependencies and prebuild
        working-directory: .
        run: cd ownables_sdk && npm i && npm run rustup &&  npm run build && cd .. && cd universal-wallet && npm i && chmod +x ./run && ./run prebuild && ./run build-apk && echo "APK_PATH=$(pwd)/android/app/build/outputs/apk/release/app-release.apk" >>$GITHUB_ENV

      # Upload to github release
      - name: Upload APK to GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: app-release.apk
          asset_content_type: application/vnd.android.package-archive

      # Get the download URL of the APK
      - name: Get Download URL
        id: get_download_url
        run: |
          echo "::set-output name=DOWNLOAD_URL::$(curl -s -X GET -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' 'https://api.github.com/repos/${{ github.repository }}/releases/latest' | jq -r '.assets[0].browser_download_url')" &&
          echo DOWNLOAD_URL=$(curl -s -X GET -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' 'https://api.github.com/repos/${{ github.repository }}/releases/latest' | jq -r '.assets[0].browser_download_url') >> $GITHUB_ENV &&
          echo $DOWNLOAD_URL
          #   # Email the APK to the team

